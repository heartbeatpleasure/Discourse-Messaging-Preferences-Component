en:
  theme_metadata:
    description: Frontend for member-defined messaging preferences.
  messaging_preferences:
    settings:
      title: Messaging preferences
      description: Let other members know what helps you feel comfortable when they contact you through personal messages
        or direct chat. These preferences are informational and do not replace the community guidelines.
      works_well:
        label: What works well for me
        description: 'For example: introduce yourself, explain why you are messaging, or allow time for a reply.'
        placeholder: Describe what helps make conversations comfortable and enjoyable for you.
      please_avoid:
        label: Please avoid
        description: 'For example: repeated messages, unsolicited explicit content, or pressure to respond.'
        placeholder: Describe behaviour or types of messages you would prefer not to receive.
      character_count: '%{used} / %{maximum}'
      save_hint: These preferences belong to @%{username} and are saved with the Save Changes button below.
      load_error: The saved messaging preferences could not be loaded.
    display:
      title: Before messaging %{username}
      description: Please review %{username}'s preferences before continuing.
      compact_label: '%{username} has messaging preferences'
      chat_compact_label: '%{username} has messaging preferences'
      works_well: What works well for me
      please_avoid: Please avoid
      got_it: Got it
      view: View
      close: Close
      view_title: View %{username}'s messaging preferences
      load_error: Messaging preferences could not be loaded.
      acknowledge_error: The preferences could not be acknowledged. Please try again.
